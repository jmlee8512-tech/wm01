<meta charset="UTF-8">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
.root{width:100%;font-family:var(--font-sans);background:#1a2a1a;overflow:hidden;}
.screen{display:none;}.screen.active{display:block;}
.card-screen{background:#1a2a1a;padding:20px 14px 24px;}
.card-top{text-align:center;margin-bottom:18px;}
.game-tag{font-size:14px;font-weight:500;letter-spacing:.12em;color:#7db87d;text-transform:uppercase;margin-bottom:6px;}
.card-subtitle{font-size:24px;font-weight:500;color:#e8f0e8;}
.thumb-row{display:flex;justify-content:center;gap:10px;margin-bottom:16px;}
.thumb{width:88px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px;transition:transform .15s;}
.thumb:hover{transform:scale(1.06);}
.thumb-ring{width:72px;height:72px;border-radius:50%;border:3px solid #444;overflow:hidden;display:flex;align-items:center;justify-content:center;background:transparent;transition:border-color .2s,box-shadow .2s;}
.thumb-ring.active{border-color:#f5c842;box-shadow:0 0 0 3px rgba(245,200,66,.35);}
.thumb-name{font-size:14px;color:#aaa;text-align:center;transition:color .2s;}
.thumb-name.active{color:#f5c842;font-weight:500;}
.main-card{background:#f5f0e8;border-radius:16px;border:3.5px solid #1a1a1a;overflow:hidden;display:flex;flex-direction:column;transition:opacity .22s ease;}
.main-card.fade{opacity:0;}
.card-hero{display:flex;align-items:flex-end;min-height:170px;border-bottom:3px solid #1a1a1a;}
.hero-char{display:flex;align-items:flex-end;justify-content:center;flex:0 0 160px;padding:12px 0 0;}
.hero-info{flex:1;padding:16px 16px 14px;display:flex;flex-direction:column;justify-content:center;gap:8px;}
.role-badge{font-size:14px;font-weight:500;letter-spacing:.07em;padding:5px 14px;border-radius:20px;border:2px solid #1a1a1a;display:inline-block;margin-bottom:4px;text-transform:uppercase;}
.badge-player{background:#3A6EA8;color:#fff;}
.badge-npc1{background:#D4607A;color:#fff;}
.badge-npc2{background:#4A5060;color:#fff;}
.badge-npc3{background:#5a5aaa;color:#fff;}
.hero-name{font-size:26px;font-weight:500;color:#1a1a1a;line-height:1.2;}
.hero-sub{font-size:16px;color:#555;}
.card-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:10px;}
.desc-text{font-size:20px;color:#333;line-height:1.65;}
.stat-row{display:flex;gap:6px;flex-wrap:wrap;}
.stat-chip{font-size:15px;font-weight:500;padding:5px 13px;border-radius:20px;border:1.5px solid #1a1a1a;background:#fff;color:#1a1a1a;}
.quote-box{background:#fff;border-left:3px solid #1a1a1a;border-radius:0 8px 8px 0;padding:12px 16px;font-size:20px;color:#444;line-height:1.65;font-style:italic;}
.hero-player{background:#ddeeff;}
.hero-npc1{background:#ffeedd;}
.hero-npc2{background:#eeeedd;}
.hero-npc3{background:#eeeeff;}
.start-btn{display:block;margin:20px auto 0;background:#f5c842;border:3px solid #1a1a1a;border-radius:30px;padding:14px 44px;font-size:20px;font-weight:500;color:#1a1a1a;cursor:pointer;letter-spacing:.03em;transition:transform .1s;font-family:var(--font-sans);}
.start-btn:hover{transform:scale(1.04);}
.game-screen{background:#111;}
.stage-label{background:#111;color:#7db87d;font-size:14px;font-weight:500;letter-spacing:.1em;text-align:center;padding:8px;text-transform:uppercase;}
.scene{position:relative;width:100%;height:760px;overflow:hidden;}
.bg-sky{position:absolute;inset:0;height:60%;background:#9ec8e8;}
.bg-ground{position:absolute;bottom:0;left:0;right:0;height:40%;background:#8b6040;}
.bg-horizon{position:absolute;left:0;right:0;background:#a07848;opacity:.6;bottom:38%;height:6px;}
.cloud{position:absolute;background:#cce4f4;border-radius:50%;}

.bubble::after{content:'';position:absolute;top:50%;right:-12px;transform:translateY(-50%);border:6px solid transparent;border-left-color:#1a1a1a;}
.bubble::before{content:'';position:absolute;top:50%;right:-8px;transform:translateY(-50%);border:5px solid transparent;border-left-color:#fffde8;z-index:1;}
.g-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.62);z-index:40;align-items:center;justify-content:center;}

.dot:nth-child(2){animation-delay:.2s;}

<script>
let AC; try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
let soundOn=true;
const synth=null;

document.getElementById('soundBtn').onclick=()=>{
  soundOn=!soundOn;
  document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';
  if(!soundOn) synth&&synth.cancel();
};

function beep(freq,dur,vol,type,delay){
  if(!soundOn||!AC)return;
  if(AC.state==='suspended')AC.resume();
  setTimeout(()=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=type||'square';o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.15,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start();o.stop(AC.currentTime+dur);
  },delay||0);
}
function playCard(){beep(523,.08,.18,'triangle',0);beep(659,.1,.15,'triangle',80);beep(784,.15,.12,'triangle',160);}
function playStart(){[[392,.1,.18,'triangle',0],[523,.1,.18,'triangle',100],[659,.1,.18,'triangle',200],[784,.25,.2,'triangle',300]].forEach(([f,d,v,t,dl])=>beep(f,d,v,t,dl));}
function playStep(){beep([180,200,220,240][Math.floor(Math.random()*4)],.12,.18,'square');}
function playSuccess(){[[523,.15,0],[659,.15,130],[784,.15,260],[1047,.3,390]].forEach(([f,d,t])=>beep(f,d,.15,'triangle',t));}
function playFail(){[[380,.12,0],[280,.12,130],[180,.22,260]].forEach(([f,d,t])=>beep(f,d,.13,'sawtooth',t));}

function speak(text,pitch,onEnd){
  if(!soundOn||!synth){if(onEnd)setTimeout(onEnd,100);return;}
  synth.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR';u.rate=1.05;u.pitch=pitch||1.1;
  if(onEnd)u.onend=()=>setTimeout(onEnd,350);
  synth.speak(u);
}

// 순차 TTS 큐
function speakQueue(items, done){
  if(!items.length){if(done)done();return;}
  const [text,pitch]=items[0];
  speak(text,pitch,()=>speakQueue(items.slice(1),done));
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startWalk(tx,cb){
  if(walkInterval)clearInterval(walkInterval);
  if(stepInterval)clearInterval(stepInterval);
  walkPhase=0;
  stepInterval=setInterval(()=>playStep(),280);
  walkInterval=setInterval(()=>{
    const cur=parseFloat(player.style.left)||0,diff=tx-cur;
    if(Math.abs(diff)<3){
      player.style.left=tx+'px';
      clearInterval(walkInterval);clearInterval(stepInterval);walkInterval=null;stepInterval=null;
      {const _fL=document.getElementById('footL'),_fR=document.getElementById('footR');if(_fL)_fL.setAttribute('cy','198');if(_fR)_fR.setAttribute('cy','198');}
      if(cb)cb();return;
    }
    player.style.left=(cur+(diff>0?3:-3))+'px';
    walkPhase++;
    {const _footL=document.getElementById('footL');if(_footL)_footL.setAttribute('cy',walkPhase%14<7?'193':'198');}
    {const _footR=document.getElementById('footR');if(_footR)_footR.setAttribute('cy',walkPhase%14<7?'198':'193');}
    const aL=document.getElementById('plArmL'),aR=document.getElementById('plArmR');if(!aL||!aR)return;
    if(aL&&aR){
      if(walkPhase%14<7){aL.setAttribute('d','M46 130 Q38 148 40 162 Q42 168 48 168 Q54 168 56 162 Q58 148 54 130Z');aR.setAttribute('d','M114 130 Q122 142 120 158 Q118 168 112 168 Q106 168 104 162 Q102 148 106 130Z');}
      else{aL.setAttribute('d','M46 130 Q40 145 42 165 Q44 170 50 170 Q56 170 58 165 Q58 145 56 130Z');aR.setAttribute('d','M114 130 Q120 145 118 165 Q116 170 110 170 Q104 170 102 165 Q102 145 104 130Z');}
    }
  },18);
}

let nbTyping=null;

function openNB(){
  gOverlay.style.display='none';
  showScreen('scNB');
  document.getElementById('nbChat').classList.add('active');
  document.getElementById('nbResult').classList.remove('active');
  document.getElementById('pInput').value='';
  document.getElementById('pSend').disabled=true;
  document.getElementById('nbHint').textContent='프롬프트가 자동으로 입력됩니다...';
  if(nbTyping)clearInterval(nbTyping);

  const greet='안녕하세요! 업로드된 파일을 분석할 준비가 되어 있습니다. 질문을 입력해 주세요.';
  const chatArea=document.getElementById('chatArea');
  chatArea.innerHTML='';
  const row=document.createElement('div');row.className='msg-row';
  row.innerHTML=`<div class="avatar ai">AI</div><div class="bmsg ai">${greet}</div>`;
  chatArea.appendChild(row);

  // 인사말 TTS → 끝나면 타이핑 시작
  speak(greet,1.05,()=>{
    let idx=0;
    nbTyping=setInterval(()=>{
      if(idx>=nbPrompt.length){
        clearInterval(nbTyping);
        document.getElementById('pSend').disabled=false;
        document.getElementById('nbHint').textContent='↵ 엔터키 또는 [전송] 버튼을 눌러 분석을 시작하세요.';
        document.getElementById('pSend').onclick=sendNB;
        document.addEventListener('keydown',onNBEnter);
        return;
      }
      document.getElementById('pInput').value+=nbPrompt[idx];idx++;
    },55);
  });
}

function onNBEnter(e){if(e.key==='Enter')sendNB();}

function sendNB(){
  document.removeEventListener('keydown',onNBEnter);
  document.getElementById('pSend').disabled=true;
  document.getElementById('nbHint').textContent='분석 중...';
  const ca=document.getElementById('chatArea');

  // 사용자 메시지 즉시 표시 (TTS 대기 없음)
  const ur=document.createElement('div');ur.className='msg-row user';
  const q=document.getElementById('pInput').value.trim();
  ur.innerHTML=`<div class="avatar user">나</div><div class="bmsg user">${q}</div>`;
  ca.appendChild(ur);ca.scrollTop=ca.scrollHeight;
  document.getElementById('pInput').value='';

  // AI 생각 중 즉시 표시
  const tr=document.createElement('div');tr.className='msg-row';
  tr.innerHTML=`<div class="avatar ai">AI</div><div class="bmsg ai"><div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  ca.appendChild(tr);ca.scrollTop=ca.scrollHeight;

  setTimeout(()=>{
    const doneMsg='분석이 완료되었습니다! 아래 버튼을 눌러 결과를 확인하세요.';
    tr.querySelector('.bmsg').textContent=doneMsg;
    ca.scrollTop=ca.scrollHeight;
    document.getElementById('nbHint').textContent='분석 완료!';

    // 자동 전환 대신 "최종 결과 보기" 버튼 표시
    const btnRow=document.createElement('div');
    btnRow.style.cssText='text-align:center;padding:20px 0 4px;';
    btnRow.innerHTML=`<button onclick="showNBResult()" style="background:#f5c842;border:3px solid #1a1a1a;border-radius:10px;padding:14px 36px;font-size:20px;font-weight:500;cursor:pointer;font-family:var(--font-sans);">최종 결과 보기 →</button>`;
    ca.appendChild(btnRow);
    ca.scrollTop=ca.scrollHeight;
  },1800);
}

function closeNBResult(){
  document.getElementById('nbResult').classList.remove('active');
  document.getElementById('nbChat').classList.add('active');

function showNBResult(){
  document.getElementById('nbChat').classList.remove('active');
  document.getElementById('nbResult').classList.add('active');
  const rc=document.getElementById('resultContent');rc.innerHTML='';

  // 결과 항목 렌더

  // 결과창 음성 없음
}
